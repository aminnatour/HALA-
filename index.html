<title>HALA </title>

<style>
*{
margin:0;
padding:0;
box-sizing:border-box;
font-family:Arial;
}

body{
height:100vh;
display:flex;
justify-content:center;
align-items:center;

/* 🌌 خلفية سماء حقيقية */
background:url("https://i.pinimg.com/1200x/04/c6/9f/04c69fed21224813ceb91b97c8a56ccc.jpg")
no-repeat center center fixed;
background-size:cover;
color: #ffb6c1;
}

/* ⭐ تأثير زجاجي */
.card{
width:350px;
padding:25px;
border-radius:25px;
background:rgba(0,0,0,0.55);
backdrop-filter:blur(12px);
border:1px solid rgba(255,255,255,0.2);
text-align:center;
box-shadow:0 0 30px rgba(0,0,0,0.6);
}

/* صورة البروفايل */
.card img{
width:120px;
height:120px;
border-radius:50%;
border:3px solid white;
}

/* الاسم */
h1{
margin-top:10px;
font-size:24px;
}

/* وصف */
p{
color:#ccc;
margin-bottom:20px;
}

/* الروابط */
.link{
display:block;
margin:12px 0;
padding:12px;
text-decoration:none;
background:rgba(255,255,255,0.08);
color:white;
border-radius:12px;
transition:0.3s;
}

.link:hover{
transform:scale(1.05);
background:rgba(255,255,255,0.2);
}
.link{
position:relative;
overflow:hidden;
}

/* ⭐ نجمة خفيفة يسار */
.link::before{
content:"✦";
position:absolute;
left:10px;
top:50%;
transform:translateY(-50%);
font-size:12px;
color:white;
opacity:0.5;
}

/* ⭐ نجمة خفيفة يمين */
.link::after{
content:"✦";
position:absolute;
right:10px;
top:50%;
transform:translateY(-50%);
font-size:12px;
color:white;
opacity:0.5;
}
.title{
font-size:34px;
font-weight:bold;
color:#a52a67;
letter-spacing:2px;

text-shadow:0 0 8px rgba(185, 25, 105, 0.5);

/* 🎯 توسيط */
display:flex;
justify-content:center;
width:100%;
text-align:center;
}

/* 💫 تأثير بسيط عند المرور */
.title:hover{
transform:scale(1.05);
text-shadow:0 0 12px rgba(77, 76, 76, 0.8);
}
.hi{
 position:relative;
top:30px;
}
</style>
